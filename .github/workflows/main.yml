name: Build, Push, and Deploy Docker image to ACR

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**/*.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image (dev)
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/yonchee-bot:dev

      - name: Build and push Docker image (prod)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/yonchee-bot:prod

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable external ingress and get webhook URL (dev)
        run: |
          az containerapp ingress enable \
            --name yonchee-bot-dev \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --type external \
            --target-port 8000 \
            --transport http 2>/dev/null || true
          FQDN=$(az containerapp show \
            --name yonchee-bot-dev \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "WEBHOOK_URL=https://${FQDN}" >> $GITHUB_ENV

      - name: Set Azure Container App Secrets (dev)
        run: |
          az containerapp secret set \
            --name yonchee-bot-dev \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              azure-form-recognizer-endpoint=${{ secrets.AZURE_FORM_RECOGNIZER_ENDPOINT }} \
              azure-form-recognizer-key=${{ secrets.AZURE_FORM_RECOGNIZER_KEY }} \
              azure-speech-api-key=${{ secrets.AZURE_SPEECH_API_KEY }} \
              azure-region=${{ secrets.AZURE_REGION }} \
              telegram-api-token=${{ secrets.TELEGRAM_API_TOKEN_DEV }} \
              appinsights-instrumentationkey=${{ secrets.APPINSIGHTS_INSTRUMENTATIONKEY }} \
              webhook-url=${{ env.WEBHOOK_URL }}

      - name: Deploy to Azure Container App (dev)
        run: |
          az containerapp update \
            --name yonchee-bot-dev \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/yonchee-bot:dev \
            --revision-suffix run-${{ github.run_number }} \
            --min-replicas 0 \
            --max-replicas 2 \
            --set-env-vars \
              BOT_ENV=dev \
              WEBHOOK_URL=secretref:webhook-url \
              TELEGRAM_API_TOKEN=secretref:telegram-api-token \
              AZURE_FORM_RECOGNIZER_ENDPOINT=secretref:azure-form-recognizer-endpoint \
              AZURE_FORM_RECOGNIZER_KEY=secretref:azure-form-recognizer-key \
              AZURE_SPEECH_API_KEY=secretref:azure-speech-api-key \
              AZURE_REGION=secretref:azure-region \
              APPINSIGHTS_INSTRUMENTATIONKEY=secretref:appinsights-instrumentationkey

      - name: Register Telegram webhook (dev)
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_API_TOKEN_DEV }}/setWebhook" \
            -d "url=${{ env.WEBHOOK_URL }}/${{ secrets.TELEGRAM_API_TOKEN_DEV }}" \
            | tee /dev/stderr | grep -q '"ok":true'

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure Container App Secrets (prod)
        run: |
          az containerapp secret set \
            --name yonchee-bot-prod \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              azure-form-recognizer-endpoint=${{ secrets.AZURE_FORM_RECOGNIZER_ENDPOINT }} \
              azure-form-recognizer-key=${{ secrets.AZURE_FORM_RECOGNIZER_KEY }} \
              azure-speech-api-key=${{ secrets.AZURE_SPEECH_API_KEY }} \
              azure-region=${{ secrets.AZURE_REGION }} \
              telegram-api-token=${{ secrets.TELEGRAM_API_TOKEN_PROD }} \
              appinsights-instrumentationkey=${{ secrets.APPINSIGHTS_INSTRUMENTATIONKEY }}

      - name: Deploy to Azure Container App (prod)
        run: |
          az containerapp update \
            --name yonchee-bot-prod \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/yonchee-bot:prod \
            --set-env-vars \
              BOT_ENV=prod \
              TELEGRAM_API_TOKEN=secretref:telegram-api-token \
              AZURE_FORM_RECOGNIZER_ENDPOINT=secretref:azure-form-recognizer-endpoint \
              AZURE_FORM_RECOGNIZER_KEY=secretref:azure-form-recognizer-key \
              AZURE_SPEECH_API_KEY=secretref:azure-speech-api-key \
              AZURE_REGION=secretref:azure-region \
              APPINSIGHTS_INSTRUMENTATIONKEY=secretref:appinsights-instrumentationkey